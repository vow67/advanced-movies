<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 CineVerse Pro</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <style>
    /* ----- RESET & VARIABLES ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a14;
      --bg-secondary: #12121f;
      --bg-card: #1a1a2e;
      --bg-card-hover: #22223a;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --text-muted: #6a6a82;
      --accent: #7c3aed;
      --accent-glow: rgba(124,58,237,0.35);
      --border-color: #2a2a42;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
      --rating-color: #fbbf24;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
    a { text-decoration: none; color: inherit; }

    /* ----- SCROLLBAR ----- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    /* ----- HEADER ----- */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 0;
    }
    .header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.6rem;
      font-weight: 800;
    }
    .logo i { color: var(--accent); }
    .logo span { background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-wrapper i {
      position: absolute; left: 14px;
      color: var(--text-muted);
    }
    .search-input {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      padding: 10px 18px 10px 42px;
      font-size: 0.9rem;
      color: var(--text-primary);
      width: 220px;
      transition: var(--transition);
      font-family: inherit;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      width: 280px;
    }
    .btn-icon {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
    }
    .btn-icon:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: scale(1.05);
    }

    /* ----- HERO ----- */
    .hero {
      padding: 40px 0 30px;
      text-align: center;
      position: relative;
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .hero h1 .highlight {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--text-secondary);
      max-width: 600px;
      margin: 8px auto 20px;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    .hero-stats .stat .number {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .hero-stats .stat .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ----- CONTROLS ----- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin: 20px 0 24px;
      align-items: center;
      justify-content: space-between;
    }
    .control-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .control-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-btn, .sort-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }
    .filter-btn.active, .sort-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .filter-btn:hover, .sort-btn:hover {
      border-color: var(--accent);
      color: #fff;
      background: rgba(124,58,237,0.08);
    }

    /* ----- GRID ----- */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
      padding: 8px 0 20px;
    }

    /* ----- CARD ----- */
    .movie-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }
    .movie-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 12px 48px rgba(124,58,237,0.2);
      background: var(--bg-card-hover);
    }
    .movie-card .poster {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    .movie-card .poster img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }
    .movie-card:hover .poster img { transform: scale(1.04); }

    .movie-card .poster .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 60%);
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }
    .movie-card:hover .poster .overlay { opacity: 1; }
    .movie-card .poster .overlay .rating-badge {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--rating-color);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .movie-card .poster .year-badge {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .movie-card .poster .country-badge {
      position: absolute;
      bottom: 12px; left: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .movie-card .info {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .movie-card .info .title {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .movie-card .info .genres {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .movie-card .info .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.8rem;
    }
    .movie-card .info .meta-row .rating {
      color: var(--rating-color);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .movie-card .info .meta-row .votes {
      color: var(--text-muted);
      font-size: 0.7rem;
    }
    .movie-card .favorite-btn {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      z-index: 2;
    }
    .movie-card .favorite-btn:hover { background: var(--accent); }
    .movie-card .favorite-btn.liked { color: #ef4444; background: rgba(239,68,68,0.3); }

    /* ----- LOAD MORE ----- */
    .load-more {
      display: block;
      margin: 20px auto 40px;
      padding: 12px 40px;
      border-radius: 100px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .load-more:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }

    /* ----- MODAL ----- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.92) translateY(20px);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid var(--border-color);
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
      padding: 0;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-close {
      position: sticky;
      top: 12px; right: 12px;
      float: right;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: none;
      color: #fff;
      width: 40px; height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 12px 0 0;
    }
    .modal-close:hover { background: var(--accent); transform: rotate(90deg); }
    .modal-body {
      padding: 0 28px 32px;
      margin-top: -12px;
    }
    .modal-body .modal-poster {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .modal-body .modal-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 16px 0 4px;
    }
    .modal-body .modal-tagline {
      color: var(--text-secondary);
      font-style: italic;
      margin-bottom: 12px;
    }
    .modal-body .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .modal-body .modal-meta span { display: flex; align-items: center; gap: 6px; }
    .modal-body .modal-meta i { color: var(--accent); width: 16px; }
    .modal-body .modal-overview {
      color: var(--text-secondary);
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .modal-body .modal-genres { display: flex; flex-wrap: wrap; gap: 8px; }
    .modal-body .modal-genres .genre-tag {
      background: var(--bg-card);
      padding: 4px 16px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }
    .modal-body .modal-country {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .modal-body .modal-country i { color: var(--accent); margin-right: 6px; }

    /* ----- NO RESULTS / LOADING ----- */
    .loading, .no-results {
      text-align: center;
      padding: 40px 0;
      color: var(--text-secondary);
    }
    .loading .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ----- FOOTER ----- */
    .footer {
      border-top: 1px solid var(--border-color);
      padding: 24px 0;
      margin-top: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .footer a { color: var(--accent); }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 768px) {
      .header-inner { flex-direction: column; align-items: stretch; gap: 8px; }
      .search-input { width: 100% !important; }
      .controls { flex-direction: column; align-items: stretch; }
      .hero h1 { font-size: 2rem; }
      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
    }
    @media (max-width: 480px) {
      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">
      <a href="#" class="logo"><i class="fas fa-film"></i><span>CineVerse Pro</span></a>
      <div class="header-actions">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Search movies..." autocomplete="off" />
        </div>
        <button class="btn-icon" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
        <button class="btn-icon" id="favoritesToggle" title="Show favorites"><i class="fas fa-heart"></i></button>
        <button class="btn-icon" id="refreshBtn" title="Refresh from TMDB"><i class="fas fa-sync"></i></button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>Discover <span class="highlight">Global</span> Cinema</h1>
      <p>Explore movies from around the world. Filter, sort, and save your favorites.</p>
      <div class="hero-stats">
        <div class="stat"><div class="number" id="movieCount">0</div><div class="label">Movies</div></div>
        <div class="stat"><div class="number" id="genreCount">0</div><div class="label">Genres</div></div>
        <div class="stat"><div class="number" id="countryCount">0</div><div class="label">Countries</div></div>
        <div class="stat"><div class="number" id="ratingAvg">0</div><div class="label">Avg Rating</div></div>
      </div>
    </div>
  </section>

  <!-- MAIN -->
  <main class="container">
    <!-- Controls -->
    <div class="controls" id="controls">
      <div class="control-group" id="genreFilters">
        <label><i class="fas fa-tags"></i> Genre</label>
        <button class="filter-btn active" data-type="genre" data-value="all">All</button>
      </div>
      <div class="control-group" id="countryFilters">
        <label><i class="fas fa-globe"></i> Country</label>
        <button class="filter-btn active" data-type="country" data-value="all">All</button>
      </div>
      <div class="control-group" id="sortControls">
        <label><i class="fas fa-sort"></i> Sort</label>
        <button class="sort-btn active" data-sort="popularity">Popular</button>
        <button class="sort-btn" data-sort="rating">Rating</button>
        <button class="sort-btn" data-sort="year">Year</button>
        <button class="sort-btn" data-sort="title">Title</button>
      </div>
    </div>

    <!-- Grid -->
    <div id="moviesGrid" class="movies-grid"></div>

    <!-- Loading & No Results -->
    <div id="loadingState" class="loading" style="display:none;"><div class="spinner"></div><span>Loading...</span></div>
    <div id="noResults" class="no-results" style="display:none;"><i class="fas fa-film" style="font-size:2.5rem;color:var(--text-muted);"></i><h3>No movies found</h3><p>Try adjusting filters or search.</p></div>

    <!-- Load More -->
    <button class="load-more" id="loadMoreBtn" style="display:none;">Load More <i class="fas fa-chevron-down"></i></button>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      <img class="modal-poster" id="modalPoster" src="" alt="Poster" />
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle">—</h2>
        <p class="modal-tagline" id="modalTagline"></p>
        <div class="modal-meta" id="modalMeta">
          <span><i class="fas fa-calendar-alt"></i> <span id="modalYear">—</span></span>
          <span><i class="fas fa-star" style="color:var(--rating-color);"></i> <span id="modalRating">—</span></span>
          <span><i class="fas fa-clock"></i> <span id="modalRuntime">—</span></span>
          <span><i class="fas fa-globe"></i> <span id="modalCountry">—</span></span>
        </div>
        <p class="modal-overview" id="modalOverview">—</p>
        <div class="modal-genres" id="modalGenres"></div>
        <div class="modal-country" id="modalCountries"></div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 <a href="#">CineVerse Pro</a> — Powered by TMDB &amp; Telegram</p>
    </div>
  </footer>

  <script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const TMDB_API_KEY = 'b4800cfea522c32661aa12691b22e5ce'; // <-- Replace with your key
    const TMDB_BASE = 'https://api.themoviedb.org/3';
    const POSTER_BASE = 'https://image.tmdb.org/t/p/w342';
    const BACKDROP_BASE = 'https://image.tmdb.org/t/p/w780';

    // Static fallback data (your original list) – used if API fails or key missing
    const FALLBACK_MOVIES = [ /* your 35 movies here – omitted for brevity, but you can include them */ ];

    // ============================================================
    //  STATE
    // ============================================================
    let allMovies = [];          // full dataset (combined from API + fallback)
    let displayedMovies = [];    // current filtered/sorted list
    let currentPage = 1;
    const PER_PAGE = 20;
    let activeGenre = 'all';
    let activeCountry = 'all';
    let currentSort = 'popularity';
    let searchQuery = '';
    let showFavorites = false;
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let isLoading = false;
    let hasMore = true;

    // ============================================================
    //  DOM REFS
    // ============================================================
    const grid = document.getElementById('moviesGrid');
    const loading = document.getElementById('loadingState');
    const noResults = document.getElementById('noResults');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const searchInput = document.getElementById('searchInput');
    const movieCount = document.getElementById('movieCount');
    const genreCount = document.getElementById('genreCount');
    const countryCount = document.getElementById('countryCount');
    const ratingAvg = document.getElementById('ratingAvg');
    const themeToggle = document.getElementById('themeToggle');
    const favoritesToggle = document.getElementById('favoritesToggle');
    const refreshBtn = document.getElementById('refreshBtn');

    // Modal
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalPoster = document.getElementById('modalPoster');
    const modalTitle = document.getElementById('modalTitle');
    const modalTagline = document.getElementById('modalTagline');
    const modalYear = document.getElementById('modalYear');
    const modalRating = document.getElementById('modalRating');
    const modalRuntime = document.getElementById('modalRuntime');
    const modalCountry = document.getElementById('modalCountry');
    const modalOverview = document.getElementById('modalOverview');
    const modalGenres = document.getElementById('modalGenres');
    const modalCountries = document.getElementById('modalCountries');

    // ============================================================
    //  HELPERS
    // ============================================================
    function getPosterUrl(path) { return path ? `${POSTER_BASE}${path}` : 'https://placehold.co/342x513/1a1a2e/6a6a82?text=No+Poster'; }
    function getBackdropUrl(path) { return path ? `${BACKDROP_BASE}${path}` : 'https://placehold.co/780x440/1a1a2e/6a6a82?text=No+Image'; }
    function getGenresList(movie) { return movie.genres ? movie.genres.join(' • ') : ''; }
    function getYear(date) { return date ? new Date(date).getFullYear() : '—'; }

    function getAllGenres(movies) {
      const set = new Set();
      movies.forEach(m => (m.genres || []).forEach(g => set.add(g)));
      return ['All', ...Array.from(set).sort()];
    }
    function getAllCountries(movies) {
      const set = new Set();
      movies.forEach(m => { if (m.country) set.add(m.country); });
      return ['All', ...Array.from(set).sort()];
    }

    // ============================================================
    //  TMDB API FETCH
    // ============================================================
    async function fetchTMDBMovies() {
      if (!TMDB_API_KEY || TMDB_API_KEY === 'YOUR_TMDB_API_KEY') {
        console.warn('No TMDB API key provided. Using fallback data.');
        return null;
      }
      try {
        // Fetch popular movies (first 3 pages to get a good sample)
        const pages = [1, 2, 3];
        const allResults = [];
        for (const page of pages) {
          const res = await fetch(`${TMDB_BASE}/movie/popular?api_key=${TMDB_API_KEY}&language=en-US&page=${page}`);
          const data = await res.json();
          allResults.push(...data.results);
        }
        // Also fetch top_rated to add variety
        const topRes = await fetch(`${TMDB_BASE}/movie/top_rated?api_key=${TMDB_API_KEY}&language=en-US&page=1`);
        const topData = await topRes.json();
        allResults.push(...topData.results.slice(0, 10));

        // Remove duplicates by id
        const unique = Array.from(new Map(allResults.map(m => [m.id, m])).values());

        // Map to our format
        return unique.map(m => ({
          id: m.id,
          title: m.title,
          year: parseInt(m.release_date?.slice(0,4)) || 0,
          rating: m.vote_average || 0,
          votes: m.vote_count || 0,
          runtime: m.runtime ? `${Math.floor(m.runtime/60)}h ${m.runtime%60}m` : '—',
          tagline: m.tagline || '',
          overview: m.overview || '',
          genres: m.genre_names || [], // we'll fetch genre names later
          country: m.production_countries?.[0]?.name || 'Unknown',
          poster: m.poster_path,
          backdrop: m.backdrop_path,
          // store extra fields
          release_date: m.release_date,
          production_countries: m.production_countries || [],
        }));
      } catch (err) {
        console.warn('TMDB fetch failed:', err);
        return null;
      }
    }

    // Fetch genre names separately (to map IDs)
    async function fetchGenres() {
      if (!TMDB_API_KEY || TMDB_API_KEY === 'YOUR_TMDB_API_KEY') return {};
      try {
        const res = await fetch(`${TMDB_BASE}/genre/movie/list?api_key=${TMDB_API_KEY}&language=en-US`);
        const data = await res.json();
        const map = {};
        data.genres.forEach(g => { map[g.id] = g.name; });
        return map;
      } catch { return {}; }
    }

    // Enhance movies with genre names
    async function enhanceWithGenres(movies) {
      const genreMap = await fetchGenres();
      return movies.map(m => {
        if (m.genre_ids && genreMap) {
          m.genres = m.genre_ids.map(id => genreMap[id]).filter(Boolean);
        }
        return m;
      });
    }

    // ============================================================
    //  DATA LOADING
    // ============================================================
    async function loadData() {
      loading.style.display = 'block';
      grid.innerHTML = '';
      noResults.style.display = 'none';
      loadMoreBtn.style.display = 'none';

      let tmdbData = await fetchTMDBMovies();
      if (tmdbData) {
        tmdbData = await enhanceWithGenres(tmdbData);
        allMovies = tmdbData;
      } else {
        // Fallback to static data (you can include your MOVIES array here)
        allMovies = FALLBACK_MOVIES;
      }

      // Merge with local favorites (add liked flag)
      allMovies = allMovies.map(m => ({
        ...m,
        liked: favorites.includes(m.id)
      }));

      // Rebuild filters and render
      buildFilters();
      applyFiltersAndSort();
      loading.style.display = 'none';
    }

    // ============================================================
    //  FILTERS & SORT
    // ============================================================
    function buildFilters() {
      // Genre
      const genres = getAllGenres(allMovies);
      const genreContainer = document.getElementById('genreFilters');
      genreContainer.innerHTML = `<label><i class="fas fa-tags"></i> Genre</label>` +
        genres.map(g => {
          const key = g === 'All' ? 'all' : g;
          return `<button class="filter-btn ${key === activeGenre ? 'active' : ''}" data-type="genre" data-value="${key}">${g}</button>`;
        }).join('');

      // Country
      const countries = getAllCountries(allMovies);
      const countryContainer = document.getElementById('countryFilters');
      countryContainer.innerHTML = `<label><i class="fas fa-globe"></i> Country</label>` +
        countries.map(c => {
          const key = c === 'All' ? 'all' : c;
          return `<button class="filter-btn ${key === activeCountry ? 'active' : ''}" data-type="country" data-value="${key}">${c}</button>`;
        }).join('');

      // Add event listeners
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const type = btn.dataset.type;
          const value = btn.dataset.value;
          const group = btn.closest('.control-group');
          group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (type === 'genre') activeGenre = value;
          else if (type === 'country') activeCountry = value;
          currentPage = 1;
          applyFiltersAndSort();
        });
      });

      // Sort buttons
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSort = btn.dataset.sort;
          currentPage = 1;
          applyFiltersAndSort();
        });
      });
    }

    function applyFiltersAndSort() {
      let result = [...allMovies];

      // Filter by genre
      if (activeGenre !== 'all') {
        result = result.filter(m => (m.genres || []).includes(activeGenre));
      }
      // Filter by country
      if (activeCountry !== 'all') {
        result = result.filter(m => m.country === activeCountry);
      }
      // Filter by search
      if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        result = result.filter(m =>
          m.title.toLowerCase().includes(q) ||
          (m.genres || []).some(g => g.toLowerCase().includes(q)) ||
          (m.country || '').toLowerCase().includes(q)
        );
      }
      // Favorites
      if (showFavorites) {
        result = result.filter(m => m.liked);
      }

      // Sort
      switch (currentSort) {
        case 'rating': result.sort((a, b) => b.rating - a.rating); break;
        case 'year': result.sort((a, b) => b.year - a.year); break;
        case 'title': result.sort((a, b) => a.title.localeCompare(b.title)); break;
        default: // popularity (by votes)
          result.sort((a, b) => b.votes - a.votes);
      }

      displayedMovies = result;
      updateStats(result);
      renderPaginated();
    }

    function renderPaginated() {
      const start = 0;
      const end = currentPage * PER_PAGE;
      const pageMovies = displayedMovies.slice(start, end);
      const hasMoreData = end < displayedMovies.length;
      hasMore = hasMoreData;

      if (pageMovies.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        loadMoreBtn.style.display = 'none';
        return;
      }
      noResults.style.display = 'none';

      // If first page, clear grid
      if (currentPage === 1) {
        grid.innerHTML = '';
      }

      // Append cards
      pageMovies.forEach((movie, index) => {
        const card = createCard(movie, index);
        grid.appendChild(card);
      });

      loadMoreBtn.style.display = hasMoreData ? 'block' : 'none';
    }

    function createCard(movie, index) {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.dataset.id = movie.id;
      card.style.animationDelay = `${(index % 10) * 0.02}s`;
      card.innerHTML = `
        <div class="poster">
          <img src="${getPosterUrl(movie.poster)}" alt="${movie.title}" loading="lazy" />
          <span class="year-badge">${movie.year || '—'}</span>
          <span class="country-badge"><i class="fas fa-flag"></i> ${movie.country || 'Unknown'}</span>
          <div class="overlay">
            <span class="rating-badge"><i class="fas fa-star"></i> ${movie.rating ? movie.rating.toFixed(1) : '—'}</span>
          </div>
        </div>
        <button class="favorite-btn ${movie.liked ? 'liked' : ''}" data-id="${movie.id}">
          <i class="fas fa-heart"></i>
        </button>
        <div class="info">
          <div class="title">${movie.title}</div>
          <div class="genres">${getGenresList(movie)}</div>
          <div class="meta-row">
            <span class="rating"><i class="fas fa-star"></i> ${movie.rating ? movie.rating.toFixed(1) : '—'}</span>
            <span class="votes">${movie.votes ? movie.votes.toLocaleString() : '0'} votes</span>
          </div>
        </div>
      `;

      // Click to open modal
      card.addEventListener('click', (e) => {
        if (e.target.closest('.favorite-btn')) return;
        openModal(movie);
      });

      // Favorite button
      const favBtn = card.querySelector('.favorite-btn');
      favBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFavorite(movie.id);
      });

      return card;
    }

    // ============================================================
    //  FAVORITES
    // ============================================================
    function toggleFavorite(id) {
      const idx = favorites.indexOf(id);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      // Update allMovies liked flag
      allMovies = allMovies.map(m => ({ ...m, liked: favorites.includes(m.id) }));
      // Re-render current page
      applyFiltersAndSort();
    }

    // ============================================================
    //  STATS
    // ============================================================
    function updateStats(movies) {
      movieCount.textContent = movies.length;
      const genres = getAllGenres(movies);
      genreCount.textContent = genres.length - 1;
      const countries = getAllCountries(movies);
      countryCount.textContent = countries.length - 1;
      if (movies.length) {
        const avg = movies.reduce((s, m) => s + (m.rating || 0), 0) / movies.length;
        ratingAvg.textContent = avg.toFixed(1);
      } else {
        ratingAvg.textContent = '—';
      }
    }

    // ============================================================
    //  MODAL
    // ============================================================
    function openModal(movie) {
      modalPoster.src = getBackdropUrl(movie.backdrop);
      modalPoster.alt = movie.title;
      modalTitle.textContent = movie.title;
      modalTagline.textContent = movie.tagline || '';
      modalYear.textContent = movie.year || '—';
      modalRating.textContent = movie.rating ? movie.rating.toFixed(1) : '—';
      modalRuntime.textContent = movie.runtime || '—';
      modalCountry.textContent = movie.country || 'Unknown';
      modalOverview.textContent = movie.overview || 'No overview available.';

      modalGenres.innerHTML = (movie.genres || []).map(g =>
        `<span class="genre-tag">${g}</span>`
      ).join('');

      // Show production countries if available
      if (movie.production_countries && movie.production_countries.length) {
        modalCountries.innerHTML = `<i class="fas fa-globe"></i> Production: ${movie.production_countries.map(c => c.name).join(', ')}`;
      } else {
        modalCountries.innerHTML = '';
      }

      document.body.style.overflow = 'hidden';
      modalOverlay.classList.add('open');
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // ============================================================
    //  EVENTS
    // ============================================================
    // Search
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      currentPage = 1;
      applyFiltersAndSort();
    });

    // Load more
    loadMoreBtn.addEventListener('click', () => {
      if (hasMore) {
        currentPage++;
        renderPaginated();
      }
    });

    // Favorites toggle
    favoritesToggle.addEventListener('click', () => {
      showFavorites = !showFavorites;
      favoritesToggle.style.color = showFavorites ? '#ef4444' : '';
      currentPage = 1;
      applyFiltersAndSort();
    });

    // Refresh
    refreshBtn.addEventListener('click', async () => {
      await loadData();
    });

    // Theme toggle
    let isDark = true;
    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      const root = document.documentElement;
      if (isDark) {
        root.style.setProperty('--bg-primary', '#0a0a14');
        root.style.setProperty('--bg-secondary', '#12121f');
        root.style.setProperty('--bg-card', '#1a1a2e');
        root.style.setProperty('--bg-card-hover', '#22223a');
        root.style.setProperty('--text-primary', '#f0f0f5');
        root.style.setProperty('--text-secondary', '#a0a0b8');
        root.style.setProperty('--text-muted', '#6a6a82');
        root.style.setProperty('--border-color', '#2a2a42');
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
      } else {
        root.style.setProperty('--bg-primary', '#f4f4f9');
        root.style.setProperty('--bg-secondary', '#ffffff');
        root.style.setProperty('--bg-card', '#ffffff');
        root.style.setProperty('--bg-card-hover', '#f0f0f7');
        root.style.setProperty('--text-primary', '#11111a');
        root.style.setProperty('--text-secondary', '#4a4a5a');
        root.style.setProperty('--text-muted', '#8a8a9a');
        root.style.setProperty('--border-color', '#dddde8');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
      }
      // Repaint cards
      applyFiltersAndSort();
    });

    // ============================================================
    //  INIT
    // ============================================================
    // Load fallback data inline (you can paste your MOVIES array here)
    // For brevity, I'll define a small fallback
    const FALLBACK_MOVIES = [
      // ... your 35 movies from previous version ...
      // To save space, I'll include a minimal set; you can replace with your full list.
      { id: 1, title: 'Inception', year: 2010, rating: 8.8, votes: 24567, runtime: '2h 28m', tagline: '', overview: '...', genres: ['Sci-Fi','Action','Thriller'], country: 'USA', poster: '/9gk7adHY1V0J2G6wjWITVJksgNA.jpg', backdrop: '/s3TBrgb1oXx2KN9Z4klyBDtRz85.jpg', liked: false },
      // Add the rest...
    ];

    // Start
    loadData();

    console.log('🎬 CineVerse Pro loaded – enjoy!');
  </script>
